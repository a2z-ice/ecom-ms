<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="700" viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" font-family="'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="nCyan" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#0e7490;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nRose" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#be123c;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nBlue" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nGreen" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nRed" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ef4444;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#b91c1c;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nAmber" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#b45309;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nPurple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="nSlate" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:0.95"/>
      <stop offset="100%" style="stop-color:#475569;stop-opacity:0.95"/>
    </linearGradient>
    <linearGradient id="tierBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#f43f5e" flood-opacity="0.25"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowB" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#3b82f6" flood-opacity="0.2"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowC" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#06b6d4" flood-opacity="0.25"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowG" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#22c55e" flood-opacity="0.2"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowR" x="-15%" y="-15%" width="130%" height="130%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feFlood flood-color="#ef4444" flood-opacity="0.2"/>
      <feComposite in2="b" operator="in"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="aRose" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#f43f5e"/>
    </marker>
    <marker id="aGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#22c55e"/>
    </marker>
    <marker id="aBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#3b82f6"/>
    </marker>
    <marker id="aRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#ef4444"/>
    </marker>
    <marker id="aWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#cbd5e1"/>
    </marker>
    <marker id="aAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#f59e0b"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.3" opacity="0.12"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="700" fill="url(#bg)"/>
  <rect width="1200" height="700" fill="url(#grid)"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle" fill="#f1f5f9" font-size="20" font-weight="700" letter-spacing="1">Gateway-Level CSRF Protection Architecture</text>
  <text x="600" y="52" text-anchor="middle" fill="#94a3b8" font-size="11" letter-spacing="2">ISTIO ext_authz + Go CSRF SERVICE + REDIS</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ROW 1: Browser (y=70) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="70" width="1140" height="70" rx="10" fill="url(#tierBg)" stroke="#475569" stroke-width="0.5"/>
  <text x="48" y="88" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="3">CLIENT</text>

  <rect x="410" y="84" width="380" height="44" rx="10" fill="url(#nGreen)" filter="url(#glowG)"/>
  <text x="600" y="104" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">User Browser (React SPA)</text>
  <text x="600" y="120" text-anchor="middle" fill="#dcfce7" font-size="9">fetchCsrfToken() on login | X-CSRF-Token on POST/PUT/DELETE</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ROW 2: Gateway + CSRF Service (y=156) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="156" width="1140" height="145" rx="10" fill="url(#tierBg)" stroke="#475569" stroke-width="0.5"/>
  <text x="48" y="174" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="3">GATEWAY / CSRF ENFORCEMENT</text>

  <!-- Istio Gateway -->
  <rect x="80" y="188" width="300" height="100" rx="12" fill="url(#nCyan)" filter="url(#glowC)"/>
  <text x="230" y="214" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Istio Gateway</text>
  <text x="230" y="234" text-anchor="middle" fill="#cffafe" font-size="10">Kubernetes Gateway API</text>
  <text x="230" y="252" text-anchor="middle" fill="#a5f3fc" font-size="9">HTTPS :30000 | TLS Termination</text>
  <text x="230" y="270" text-anchor="middle" fill="#67e8f9" font-size="9">AuthorizationPolicy: CUSTOM</text>

  <!-- ext_authz arrow: Gateway → CSRF -->
  <line x1="380" y1="238" x2="470" y2="218" stroke="#f43f5e" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#aRose)"/>
  <text x="430" y="218" text-anchor="middle" fill="#fda4af" font-size="9" font-weight="600">ext_authz</text>

  <!-- CSRF Service -->
  <rect x="475" y="186" width="280" height="104" rx="12" fill="url(#nRose)" filter="url(#glow)"/>
  <text x="615" y="210" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">CSRF Service</text>
  <text x="615" y="228" text-anchor="middle" fill="#ffe4e6" font-size="10">Go 1.25 | 2 Replicas | HPA 2-5</text>
  <text x="615" y="246" text-anchor="middle" fill="#fda4af" font-size="9">GET → 200 (pass through)</text>
  <text x="615" y="262" text-anchor="middle" fill="#fda4af" font-size="9">POST/PUT/DELETE → Validate token</text>
  <text x="615" y="278" text-anchor="middle" fill="#fecdd3" font-size="8">Prometheus /metrics | /healthz | /livez</text>

  <!-- CSRF → Redis -->
  <line x1="755" y1="240" x2="860" y2="240" stroke="#ef4444" stroke-width="1.5" marker-end="url(#aRed)"/>
  <text x="808" y="232" text-anchor="middle" fill="#fca5a5" font-size="8">csrf:{userId}</text>

  <!-- Redis -->
  <rect x="865" y="196" width="200" height="88" rx="12" fill="url(#nRed)" filter="url(#glowR)"/>
  <text x="965" y="222" text-anchor="middle" fill="#fff" font-size="14" font-weight="700">Redis</text>
  <text x="965" y="242" text-anchor="middle" fill="#fecaca" font-size="10">CSRF Token Store</text>
  <text x="965" y="260" text-anchor="middle" fill="#fca5a5" font-size="9">Key: csrf:{sub} | TTL: 30min</text>
  <text x="965" y="276" text-anchor="middle" fill="#fca5a5" font-size="8">Timing-safe compare | Fail-open</text>

  <!-- Return arrow: CSRF → Gateway (200 or 403) -->
  <line x1="475" y1="260" x2="380" y2="260" stroke="#22c55e" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="426" y="256" text-anchor="middle" fill="#86efac" font-size="8">200 or 403</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ROW 3: Backend Services (y=316) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="316" width="1140" height="100" rx="10" fill="url(#tierBg)" stroke="#475569" stroke-width="0.5"/>
  <text x="48" y="334" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="3">BACKEND SERVICES (PROTECTED BY GATEWAY CSRF)</text>

  <!-- ecom-service -->
  <rect x="80" y="346" width="280" height="58" rx="10" fill="url(#nBlue)" filter="url(#glowB)"/>
  <text x="220" y="370" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">E-Commerce Service</text>
  <text x="220" y="388" text-anchor="middle" fill="#dbeafe" font-size="9">Spring Boot 4.0.3 | /ecom/*</text>

  <!-- inventory-service -->
  <rect x="420" y="346" width="280" height="58" rx="10" fill="url(#nBlue)" filter="url(#glowB)"/>
  <text x="560" y="370" text-anchor="middle" fill="#fff" font-size="12" font-weight="700">Inventory Service</text>
  <text x="560" y="388" text-anchor="middle" fill="#dbeafe" font-size="9">Python FastAPI | /inven/*</text>

  <!-- future-service -->
  <rect x="760" y="346" width="280" height="58" rx="10" fill="url(#nSlate)" stroke="#94a3b8" stroke-dasharray="4,3"/>
  <text x="900" y="370" text-anchor="middle" fill="#94a3b8" font-size="12" font-weight="700">Future Service (Node.js, etc.)</text>
  <text x="900" y="388" text-anchor="middle" fill="#64748b" font-size="9">Auto-protected — zero code changes</text>

  <!-- Gateway → services arrows -->
  <line x1="180" y1="288" x2="180" y2="344" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#aBlue)"/>
  <line x1="280" y1="288" x2="520" y2="344" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#aBlue)"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- ROW 4: Decision Flow (y=432) -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="30" y="432" width="1140" height="250" rx="10" fill="url(#tierBg)" stroke="#475569" stroke-width="0.5"/>
  <text x="48" y="452" fill="#94a3b8" font-size="9" font-weight="700" letter-spacing="3">CSRF VALIDATION DECISION FLOW</text>

  <!-- Step 1: Incoming Request -->
  <rect x="80" y="470" width="180" height="44" rx="8" fill="url(#nCyan)"/>
  <text x="170" y="490" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Incoming Request</text>
  <text x="170" y="504" text-anchor="middle" fill="#cffafe" font-size="8">HTTPS → Gateway</text>

  <!-- Arrow → -->
  <line x1="260" y1="492" x2="305" y2="492" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#aWhite)"/>

  <!-- Step 2: Safe Method? -->
  <rect x="310" y="470" width="160" height="44" rx="22" fill="url(#nAmber)"/>
  <text x="390" y="490" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Safe Method?</text>
  <text x="390" y="504" text-anchor="middle" fill="#fef3c7" font-size="8">GET/HEAD/OPTIONS</text>

  <!-- Yes → Pass Through -->
  <line x1="390" y1="514" x2="390" y2="550" stroke="#22c55e" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="398" y="536" fill="#86efac" font-size="8">Yes</text>
  <rect x="330" y="555" width="120" height="32" rx="8" fill="url(#nGreen)"/>
  <text x="390" y="576" text-anchor="middle" fill="#fff" font-size="10" font-weight="600">200 Pass</text>

  <!-- No → -->
  <line x1="470" y1="492" x2="525" y2="492" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aAmber)"/>
  <text x="498" y="486" fill="#fcd34d" font-size="8">No</text>

  <!-- Step 3: Has JWT? -->
  <rect x="530" y="470" width="130" height="44" rx="22" fill="url(#nAmber)"/>
  <text x="595" y="490" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Has JWT?</text>
  <text x="595" y="504" text-anchor="middle" fill="#fef3c7" font-size="8">Authorization header</text>

  <!-- No JWT → Pass Through (backend handles 401) -->
  <line x1="595" y1="514" x2="595" y2="550" stroke="#22c55e" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="603" y="536" fill="#86efac" font-size="8">No</text>
  <rect x="535" y="555" width="120" height="32" rx="8" fill="url(#nGreen)"/>
  <text x="595" y="572" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">200 Pass</text>
  <text x="595" y="584" text-anchor="middle" fill="#dcfce7" font-size="7">Backend → 401</text>

  <!-- Yes → -->
  <line x1="660" y1="492" x2="715" y2="492" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#aAmber)"/>
  <text x="688" y="486" fill="#fcd34d" font-size="8">Yes</text>

  <!-- Step 4: Valid CSRF? -->
  <rect x="720" y="470" width="170" height="44" rx="22" fill="url(#nRose)"/>
  <text x="805" y="490" text-anchor="middle" fill="#fff" font-size="11" font-weight="600">Valid CSRF Token?</text>
  <text x="805" y="504" text-anchor="middle" fill="#ffe4e6" font-size="8">X-CSRF-Token ↔ Redis</text>

  <!-- Valid → 200 -->
  <line x1="805" y1="514" x2="805" y2="550" stroke="#22c55e" stroke-width="1.5" marker-end="url(#aGreen)"/>
  <text x="813" y="536" fill="#86efac" font-size="8">Valid</text>
  <rect x="745" y="555" width="120" height="32" rx="8" fill="url(#nGreen)"/>
  <text x="805" y="572" text-anchor="middle" fill="#fff" font-size="9" font-weight="600">200 Allow</text>
  <text x="805" y="584" text-anchor="middle" fill="#dcfce7" font-size="7">Refresh TTL</text>

  <!-- Invalid → 403 -->
  <line x1="890" y1="492" x2="945" y2="492" stroke="#ef4444" stroke-width="1.5" marker-end="url(#aRed)"/>
  <text x="918" y="486" fill="#fca5a5" font-size="8">Invalid</text>
  <rect x="950" y="470" width="140" height="44" rx="8" fill="url(#nRed)"/>
  <text x="1020" y="490" text-anchor="middle" fill="#fff" font-size="11" font-weight="700">403 Forbidden</text>
  <text x="1020" y="504" text-anchor="middle" fill="#fecaca" font-size="8">Request blocked</text>

  <!-- Legend -->
  <g transform="translate(80, 615)">
    <rect width="1060" height="55" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.5"/>
    <text x="20" y="20" fill="#94a3b8" font-size="9" font-weight="700">LEGEND:</text>
    <line x1="80" y1="16" x2="110" y2="16" stroke="#06b6d4" stroke-width="2"/>
    <text x="115" y="20" fill="#cffafe" font-size="9">Gateway traffic</text>
    <line x1="200" y1="16" x2="230" y2="16" stroke="#f43f5e" stroke-width="2" stroke-dasharray="5,3"/>
    <text x="235" y="20" fill="#fda4af" font-size="9">ext_authz call</text>
    <line x1="330" y1="16" x2="360" y2="16" stroke="#22c55e" stroke-width="2"/>
    <text x="365" y="20" fill="#86efac" font-size="9">Allow (200)</text>
    <line x1="430" y1="16" x2="460" y2="16" stroke="#ef4444" stroke-width="2"/>
    <text x="465" y="20" fill="#fca5a5" font-size="9">Block (403)</text>
    <line x1="530" y1="16" x2="560" y2="16" stroke="#3b82f6" stroke-width="2"/>
    <text x="565" y="20" fill="#93c5fd" font-size="9">Backend routing</text>
    <rect x="650" y="8" width="40" height="16" rx="4" fill="none" stroke="#94a3b8" stroke-dasharray="3,2"/>
    <text x="695" y="20" fill="#94a3b8" font-size="9">Future service (auto-protected)</text>
    <text x="20" y="42" fill="#64748b" font-size="8">All services protected by single CSRF enforcement point. Zero per-service CSRF code. Fail-open on Redis errors (JWT remains primary defense).</text>
  </g>
</svg>
