---
# Enforce strict mTLS for all app namespaces.
# Any traffic that is not mTLS-encrypted will be rejected.

apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: ecom
spec:
  mtls:
    mode: STRICT

---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: inventory
spec:
  mtls:
    mode: STRICT


---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: analytics
spec:
  mtls:
    mode: STRICT

---
# Superset: NodePort 32000 receives plaintext from kind hostPort — allow on app port 8088.
# portLevelMtls requires a selector (cannot be used on namespace-wide policies).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: superset-nodeport-permissive
  namespace: analytics
spec:
  selector:
    matchLabels:
      app: superset
  mtls:
    mode: STRICT
  portLevelMtls:
    "8088":
      mode: PERMISSIVE

---
# Flink: NodePort 32200 receives plaintext from kind hostPort — allow on app port 8081.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: flink-nodeport-permissive
  namespace: analytics
spec:
  selector:
    matchLabels:
      app: flink-jobmanager
  mtls:
    mode: STRICT
  portLevelMtls:
    "8081":
      mode: PERMISSIVE

---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: identity
spec:
  mtls:
    mode: STRICT

---
# Keycloak: NodePort 32400 receives plaintext from kind hostPort — allow on app port 8080.
