---
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: infra
spec:
  mtls:
    mode: STRICT

---
# Debezium Server ecom: NodePort 32300 receives plaintext from kind hostPort — allow on port 8080.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: debezium-ecom-nodeport-permissive
  namespace: infra
spec:
  selector:
    matchLabels:
