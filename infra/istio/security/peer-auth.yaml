---
# OTel namespace — PERMISSIVE mTLS required.
# Despite ambient.istio.io/redirection: disabled on OTel/Loki/Tempo pods, Istio CNI
# overrides the annotation and captures traffic through ztunnel. However, the annotation
# prevents ztunnel from setting up proper HBONE listeners on the destination side.
# PERMISSIVE allows ztunnel to fall back to plaintext when HBONE handshake fails.
# With STRICT, all connections to otel pods time out (no HBONE listener + no plaintext fallback).
# Security is enforced by NetworkPolicy (otel-netpol.yaml) which restricts:
#   - OTel Collector ingress: only ecom, inventory (OTLP), observability (Prometheus)
#   - Loki ingress: only OTel Collector (push), observability/Grafana (query)
#   - Tempo ingress: only OTel Collector (push), observability/Grafana (query)
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: permissive-mtls
  namespace: otel
spec:
  mtls:
    mode: PERMISSIVE

---
# Observability namespace — STRICT mTLS enforced at namespace level.
# Prometheus is mesh-enrolled (no annotation) so ztunnel enforces STRICT on it.
# Grafana has a port-level PERMISSIVE exception (below) for NodePort access.
# kube-state-metrics has ambient.istio.io/redirection: disabled (bypasses ztunnel).
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: strict-mtls
  namespace: observability
spec:
  mtls:
    mode: STRICT

---
# Grafana: NodePort 32500 receives plaintext from kind hostPort — allow on app port 3000.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: grafana-nodeport-permissive
  namespace: observability
spec:
  selector:
    matchLabels:
      app: grafana
  mtls:
    mode: STRICT
  portLevelMtls:
    "3000":
      mode: PERMISSIVE

---
# Prometheus: port 9090 PERMISSIVE for Kiali access.
# Kiali runs in istio-system which is NOT in the ambient mesh. It sends plaintext
# to Prometheus (in observability, which IS in the mesh). Without PERMISSIVE on
# port 9090, ztunnel enforces STRICT mTLS and resets Kiali's plaintext connection.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: prometheus-kiali-permissive
  namespace: observability
spec:
  selector:
    matchLabels:
      app: prometheus
  mtls:
    mode: STRICT
  portLevelMtls:
    "9090":
      mode: PERMISSIVE

---
# PgAdmin: NodePort 31111 receives plaintext from kind hostPort — allow on app port 80.
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: pgadmin-nodeport-permissive
  namespace: infra
spec:
  selector:
    matchLabels:
      app: pgadmin
  mtls:
    mode: STRICT
  portLevelMtls:
    "80":
      mode: PERMISSIVE
