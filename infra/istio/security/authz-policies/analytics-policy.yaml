---
# Analytics namespace — deny all external traffic.
# Only Debezium (infra ns) and Superset (analytics ns) may access analytics-db.
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: analytics-db-policy
  namespace: analytics
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: analytics-db
  rules:
    # Allow from Debezium (infra namespace)
    - from:
        - source:
            namespaces: ["infra"]
    # Allow from Superset and Flink (same namespace)
    - from:
        - source:
            namespaces: ["analytics"]
    # Allow from CNPG operator
    - from:
        - source:
            namespaces: ["cnpg-system"]
