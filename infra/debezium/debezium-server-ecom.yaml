---
# ConfigMap — Debezium Server ecom configuration
# Mounted into the pod at /debezium/conf/application.properties
apiVersion: v1
kind: ConfigMap
metadata:
  name: debezium-server-ecom-config
  namespace: infra
data:
  application.properties: |
    # Source: PostgreSQL ecom-db
    debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
    debezium.source.database.hostname=ecom-db.ecom.svc.cluster.local
    debezium.source.database.port=5432
    debezium.source.database.user=${ECOM_DB_USER}
    debezium.source.database.password=${ECOM_DB_PASSWORD}
    debezium.source.database.dbname=ecomdb
    debezium.source.topic.prefix=ecom-connector
    debezium.source.table.include.list=public.orders,public.order_items,public.books
    debezium.source.plugin.name=pgoutput
    debezium.source.slot.name=debezium_ecom_slot
    debezium.source.publication.name=debezium_ecom_pub
    debezium.source.publication.autocreate.mode=disabled
    debezium.source.snapshot.mode=when_needed
    debezium.source.decimal.handling.mode=double
    debezium.source.time.precision.mode=connect

    # Offset storage: Kafka-backed (survives pod restarts and CNPG failovers)
    debezium.source.offset.storage=org.apache.kafka.connect.storage.KafkaOffsetBackingStore
    debezium.source.offset.storage.topic=debezium.ecom.offsets
    debezium.source.offset.storage.bootstrap.servers=kafka.infra.svc.cluster.local:9092
    debezium.source.offset.flush.interval.ms=5000
    # KafkaOffsetBackingStore requires these in embedded worker config
    debezium.source.bootstrap.servers=kafka.infra.svc.cluster.local:9092
    debezium.source.offset.storage.partitions=1
    debezium.source.offset.storage.replication.factor=1

    # Sink: Kafka (same broker — produces CDC events to Kafka topics)
    debezium.sink.type=kafka
    debezium.sink.kafka.producer.bootstrap.servers=kafka.infra.svc.cluster.local:9092
    debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
    debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer

    # JSON format (no schema wrapper — Flink SQL uses plain json format)
    debezium.format.value=json
    debezium.format.key=json
    debezium.format.value.schemas.enable=false
    debezium.format.key.schemas.enable=false

    # HTTP port (Quarkus health API)
    quarkus.http.port=8080

    # Prometheus metrics — Debezium Server 3.4 bundles OTel Prometheus exporter
    # but not Quarkus Micrometer extension. Metrics available via /q/health
    # and JMX. Full Prometheus scraping requires jmx_exporter sidecar (future).
    # quarkus.micrometer.export.prometheus.enabled=true
    # quarkus.micrometer.export.prometheus.path=/q/metrics

---
# Deployment — Debezium Server ecom instance
apiVersion: apps/v1
kind: Deployment
metadata:
  name: debezium-server-ecom
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: debezium-server-ecom
  template:
    metadata:
      labels:
        app: debezium-server-ecom
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: debezium-server
          image: quay.io/debezium/server:3.4.1.Final
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: ECOM_DB_USER
              valueFrom:
                secretKeyRef:
                  name: debezium-db-credentials
                  key: ECOM_DB_USER
            - name: ECOM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: debezium-db-credentials
                  key: ECOM_DB_PASSWORD
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: config
              mountPath: /debezium/config/application.properties
              subPath: application.properties
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
          securityContext:
            readOnlyRootFilesystem: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: config
          configMap:
            name: debezium-server-ecom-config
        - name: tmp
          emptyDir: {}

---
# ClusterIP Service — internal access
apiVersion: v1
kind: Service
metadata:
  name: debezium-server-ecom
  namespace: infra
spec:
  selector:
    app: debezium-server-ecom
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

---
# NodePort Service — external health check at host:32300
apiVersion: v1
kind: Service
metadata:
  name: debezium-server-ecom-nodeport
  namespace: infra
  labels:
    app: debezium-server-ecom
spec:
  type: NodePort
  selector:
    app: debezium-server-ecom
  ports:
    - name: health
      port: 8080
      targetPort: 8080
      nodePort: 32300
