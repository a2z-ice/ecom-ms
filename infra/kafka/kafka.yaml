---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kafka-pvc
  namespace: infra
spec:
  storageClassName: local-hostpath
  volumeName: kafka-pv
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 5Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: infra
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kafka
          image: confluentinc/cp-kafka:latest
          ports:
            - containerPort: 9092
          env:
            # Override Kubernetes service-discovery injection (KAFKA_PORT=tcp://...)
            - name: KAFKA_PORT
              value: ""
            # KRaft mode — no Zookeeper required
            - name: CLUSTER_ID
              value: "H3sh4Kh3j7fN5VkZtQzTfw"
            - name: KAFKA_PROCESS_ROLES
              value: "broker,controller"
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@localhost:29093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka.infra.svc.cluster.local:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "false"
            # IMPORTANT: Mount PVC directly at /var/lib/kafka/data (not parent /var/lib/kafka).
            # confluentinc/cp-kafka declares VOLUME /var/lib/kafka/data in its Dockerfile.
            # Docker auto-creates an anonymous volume at that path which shadows any bind mount
            # at a parent directory. Mounting the PVC at the exact VOLUME path overrides it.
            - name: KAFKA_LOG_DIRS
              value: /var/lib/kafka/data
            # Cap JVM heap so the process stays within the container memory limit.
            # Without this, Confluent Kafka defaults can exceed 1Gi and OOMKill.
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx512m -Xms256m"
            # Connection management: broker closes idle connections after 10 min (explicit default).
            # Client-side AdminClient (Flink) is set to 3 min < 10 min → clients always
            # proactively close the idle connection before the broker silently drops it.
            # This prevents stale NAT table entries from causing reconnect race conditions.
            - name: KAFKA_CONNECTIONS_MAX_IDLE_MS
              value: "600000"
            # TCP keepalive: sends periodic probes on idle connections.
            # Keeps NAT table entries alive for legitimate long-lived connections (consumer fetch loop).
            - name: KAFKA_SOCKET_KEEPALIVE_ENABLE
              value: "true"
          volumeMounts:
            # Mount directly at /var/lib/kafka/data (the Docker VOLUME path) so the
            # PVC bind mount overrides the anonymous Docker volume Docker would otherwise
            # create at /var/lib/kafka/data (shadowing any parent bind mount).
            - name: data
              mountPath: /var/lib/kafka/data
          resources:
            requests:
              cpu: 250m
              memory: 768Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          readinessProbe:
            # TCP check avoids the chicken-and-egg: kafka-topics follows advertised
            # listener DNS which resolves to the Service (no endpoints until Ready)
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 6
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: kafka-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: infra
spec:
  selector:
    app: kafka
  ports:
    - name: internal
      port: 9092
      targetPort: 9092
  type: ClusterIP

# kafka-topic-init Job is in a separate file: infra/kafka/kafka-topics-init.yaml
# Apply it after this file + waiting for the Kafka deployment to be ready.
