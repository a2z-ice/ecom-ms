---
# Kafka Exporter — exports Kafka consumer group lag and topic metrics to Prometheus
# Metrics endpoint: :9308/metrics
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-exporter
  namespace: infra
  labels:
    app: kafka-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
  template:
    metadata:
      labels:
        app: kafka-exporter
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: kafka-exporter
          image: danielqsj/kafka-exporter:v1.9.0
          args:
            - --kafka.server=kafka.infra.svc.cluster.local:9092
            - --topic.filter=.*
            - --group.filter=.*
          ports:
            - containerPort: 9308
              name: metrics
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 9308
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 9308
            initialDelaySeconds: 15
            periodSeconds: 30
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

---
# ClusterIP Service — Prometheus scrapes this
apiVersion: v1
kind: Service
metadata:
  name: kafka-exporter
  namespace: infra
  labels:
    app: kafka-exporter
spec:
  selector:
    app: kafka-exporter
  ports:
    - name: metrics
      port: 9308
      targetPort: 9308
  type: ClusterIP
