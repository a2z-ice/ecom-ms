---
# Grafana Secret — admin password
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: observability
type: Opaque
data:
  # CHANGE_ME (base64)
  admin-password: Q0hBTkdFX01F

---
# Datasource provisioning — auto-configures Prometheus as default datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus.observability.svc.cluster.local:9090
        access: proxy
        isDefault: true
      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.otel.svc.cluster.local:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.otel.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "\"traceId\":\"(\\w+)\""
              name: TraceID
              url: "$${__value.raw}"

---
# Dashboard provisioning config — tells Grafana where to find dashboard JSON files
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
# Pre-built dashboards — Service Health + Cluster Overview
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  service-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate (ecom-service)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"ecom-service\"}[5m])) by (uri)",
              "legendFormat": "{{ uri }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"ecom-service\",status=~\"5..\"}[5m]))",
              "legendFormat": "ecom-service 5xx",
              "refId": "A"
            },
            {
              "expr": "sum(rate(http_server_requests_seconds_count{job=\"inventory-service\",status=~\"5..\"}[5m]))",
              "legendFormat": "inventory-service 5xx",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "color": { "mode": "palette-classic" },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 0.1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Avg Response Time (ecom-service)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "rate(http_server_requests_seconds_sum{job=\"ecom-service\"}[5m]) / rate(http_server_requests_seconds_count{job=\"ecom-service\"}[5m])",
              "legendFormat": "{{ uri }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Max Response Time",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "http_server_requests_seconds_max{job=\"ecom-service\"}",
              "legendFormat": "ecom {{ uri }}",
              "refId": "A"
            },
            {
              "expr": "http_server_requests_seconds_max{job=\"inventory-service\"}",
              "legendFormat": "inventory {{ handler }}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Service Up Status",
          "type": "stat",
          "gridPos": { "h": 4, "w": 8, "x": 0, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "up{job=~\"ecom-service|inventory-service|otel-collector\"}",
              "legendFormat": "{{ job }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "Mesh TCP Connections (ztunnel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_connections_opened_total[5m])) by (pod)",
              "legendFormat": "opened {{ pod }}",
              "refId": "A"
            },
            {
              "expr": "sum(rate(istio_tcp_connections_closed_total[5m])) by (pod)",
              "legendFormat": "closed {{ pod }}",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "cps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Mesh TCP Throughput (ztunnel)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 16 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "targets": [
            {
              "expr": "sum(rate(istio_tcp_sent_bytes_total[5m]))",
              "legendFormat": "sent",
              "refId": "A"
            },
            {
              "expr": "sum(rate(istio_tcp_received_bytes_total[5m]))",
              "legendFormat": "received",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "Bps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["service-health", "opentelemetry"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Service Health",
      "uid": "service-health"
    }
