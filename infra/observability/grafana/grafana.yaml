---
# Grafana Secret — admin password
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: observability
type: Opaque
data:
  # CHANGE_ME (base64)
  admin-password: Q0hBTkdFX01F

---
# Datasource provisioning — auto-configures Prometheus as default datasource
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus.observability.svc.cluster.local:9090
        access: proxy
        isDefault: true
      - name: Tempo
        type: tempo
        url: http://tempo.otel.svc.cluster.local:3200
        access: proxy
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
            filterByTraceID: true
          nodeGraph:
            enabled: true
          serviceMap:
            datasourceUid: prometheus
      - name: Loki
        type: loki
        uid: loki
        url: http://loki.otel.svc.cluster.local:3100
        access: proxy
        jsonData:
          derivedFields:
            - datasourceUid: tempo
              matcherRegex: "\"traceId\":\"(\\w+)\""
              name: TraceID
              url: "$${__value.raw}"

---
# Dashboard provisioning config — tells Grafana where to find dashboard JSON files
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-providers
  namespace: observability
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: 'default'
        orgId: 1
        folder: ''
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
          foldersFromFilesStructure: false

---
# Pre-built dashboards — Service Health + Cluster Overview
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  service-health.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Request Rate by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total[5m])) by (destination_service_name)",
              "legendFormat": "{{ destination_service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Error Rate by Service (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(istio_requests_total{response_code=~\"5.*\"}[5m])) by (destination_service_name) / sum(rate(istio_requests_total[5m])) by (destination_service_name)",
              "legendFormat": "{{ destination_service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "custom": { "drawStyle": "line", "fillOpacity": 10 },
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.01 },
                  { "color": "red", "value": 0.05 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "p99 Latency by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (destination_service_name, le))",
              "legendFormat": "{{ destination_service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "p50 Latency by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(istio_request_duration_milliseconds_bucket[5m])) by (destination_service_name, le))",
              "legendFormat": "{{ destination_service_name }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ms",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["istio", "service-mesh"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Service Health",
      "uid": "service-health"
    }
  cluster-overview.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Pods by Phase",
          "type": "piechart",
          "gridPos": { "h": 8, "w": 8, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase) by (phase)",
              "legendFormat": "{{ phase }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": {}, "overrides": [] }
        },
        {
          "title": "Pod Restart Count (Top 10)",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 8, "x": 8, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "topk(10, kube_pod_container_status_restarts_total)",
              "legendFormat": "{{ namespace }}/{{ pod }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }, { "color": "yellow", "value": 3 }, { "color": "red", "value": 10 }] } }, "overrides": [] },
          "options": { "orientation": "horizontal" }
        },
        {
          "title": "Running Pods by Namespace",
          "type": "bargauge",
          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(kube_pod_status_phase{phase=\"Running\"}) by (namespace)",
              "legendFormat": "{{ namespace }}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": {}, "overrides": [] },
          "options": { "orientation": "horizontal" }
        },
        {
          "title": "CPU Usage by Container",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(container_cpu_usage_seconds_total{container!=\"\",container!=\"POD\"}[5m])) by (namespace, container)",
              "legendFormat": "{{ namespace }}/{{ container }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Memory Usage by Container",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(container_memory_working_set_bytes{container!=\"\",container!=\"POD\"}) by (namespace, container)",
              "legendFormat": "{{ namespace }}/{{ container }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        }
      ],
      "schemaVersion": 39,
      "tags": ["kubernetes", "cluster"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Cluster Overview",
      "uid": "cluster-overview"
    }
  distributed-tracing.json: |
    {
      "annotations": { "list": [] },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "title": "Recent Traces",
          "type": "table",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 0 },
          "datasource": { "type": "tempo", "uid": "" },
          "targets": [
            {
              "queryType": "nativeSearch",
              "refId": "A",
              "limit": 20
            }
          ],
          "fieldConfig": { "defaults": {}, "overrides": [] }
        },
        {
          "title": "OTel Spans Received (rate/5m)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(otelcol_receiver_accepted_spans[5m])) by (receiver)",
              "legendFormat": "{{ receiver }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "OTel Collector Health",
          "type": "stat",
          "gridPos": { "h": 8, "w": 6, "x": 12, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "up{job=\"otel-collector\"}",
              "legendFormat": "otel-collector",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "0": { "text": "DOWN", "color": "red" }, "1": { "text": "UP", "color": "green" } } }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              }
            },
            "overrides": []
          }
        },
        {
          "title": "OTel Spans Dropped",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 6, "x": 18, "y": 10 },
          "datasource": { "type": "prometheus", "uid": "" },
          "targets": [
            {
              "expr": "sum(rate(otelcol_receiver_refused_spans[5m])) by (receiver)",
              "legendFormat": "{{ receiver }}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "fillOpacity": 10 }
            },
            "overrides": []
          }
        },
        {
          "title": "Service Node Graph",
          "type": "nodeGraph",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 18 },
          "datasource": { "type": "tempo", "uid": "" },
          "targets": [
            {
              "queryType": "serviceMap",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": {}, "overrides": [] }
        }
      ],
      "schemaVersion": 39,
      "tags": ["tracing", "opentelemetry", "tempo"],
      "templating": { "list": [] },
      "time": { "from": "now-1h", "to": "now" },
      "title": "Distributed Tracing",
      "uid": "distributed-tracing"
    }

---
# Grafana PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-pvc
  namespace: observability
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: local-hostpath
  resources:
    requests:
      storage: 1Gi

---
# Grafana Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: admin-password
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://localhost:32500"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /var/lib/grafana
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-providers
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-providers
          configMap:
            name: grafana-dashboard-providers
        - name: dashboards
          configMap:
            name: grafana-dashboards

---
# Grafana Service — NodePort 32500
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: observability
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32500
