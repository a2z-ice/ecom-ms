---
# Bootstrap ClusterIssuer — self-signed, used only to create the CA certificate.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-bootstrap
spec:
  selfSigned: {}

---
# CA Certificate — long-lived (10 years), signs all leaf certificates.
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bookstore-ca
  namespace: cert-manager
spec:
  isCA: true
  commonName: "BookStore CA"
  secretName: bookstore-ca-secret
  duration: 87600h    # 10 years
  renewBefore: 8760h  # 1 year
  privateKey:
    algorithm: ECDSA
    size: 256
  issuerRef:
    name: selfsigned-bootstrap
    kind: ClusterIssuer
    group: cert-manager.io

---
# CA ClusterIssuer — signs leaf certificates using the CA key.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: bookstore-ca-issuer
spec:
  ca:
    secretName: bookstore-ca-secret
