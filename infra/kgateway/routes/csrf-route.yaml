---
# HTTPRoute: CSRF token generation endpoint
# Exposed at https://api.service.net:30000/csrf/token (GET only)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: csrf-route
  namespace: infra
spec:
  parentRefs:
    - name: bookstore-gateway
      namespace: infra
      sectionName: https
  hostnames:
    - "api.service.net"
  rules:
    - matches:
        - path:
            type: Exact
            value: /csrf/token
      backendRefs:
        - name: csrf-service
          port: 8080
