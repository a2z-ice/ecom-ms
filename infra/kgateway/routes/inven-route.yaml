---
# HTTPRoute — api.service.net:30000/inven → inventory-service in inventory namespace
# Only exposes public read endpoints. POST /inven/stock/reserve is internal-only:
# ecom-service calls it directly (pod-to-pod mTLS), bypassing the gateway.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: inven-route
  namespace: inventory
spec:
  parentRefs:
    - name: bookstore-gateway
      namespace: infra
      sectionName: https
  hostnames:
    - "api.service.net"
  rules:
    # Public stock read (GET /inven/stock/{book_id})
    - matches:
        - path:
            type: PathPrefix
            value: /inven/stock
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # Health endpoints (GET /inven/health, /inven/health/ready)
    - matches:
        - path:
            type: PathPrefix
            value: /inven/health
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # Prometheus metrics (GET /inven/metrics)
    - matches:
        - path:
            type: Exact
            value: /inven/metrics
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # OpenAPI specification (GET /inven/openapi.json)
    - matches:
        - path:
            type: Exact
            value: /inven/openapi.json
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # Swagger UI interactive docs (GET /inven/docs)
    - matches:
        - path:
            type: Exact
            value: /inven/docs
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # ReDoc documentation page (GET /inven/redoc)
    - matches:
        - path:
            type: Exact
            value: /inven/redoc
          method: GET
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
    # Admin stock management — GET/PUT/POST /inven/admin/stock/**
    # JWT authentication enforced by the service (require_role("admin"))
    - matches:
        - path:
            type: PathPrefix
            value: /inven/admin
      backendRefs:
        - name: inventory-service
          namespace: inventory
          port: 8000
