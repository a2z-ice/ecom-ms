---
# HTTPRoute — redirects all HTTP traffic to HTTPS on the same host/port.
# Attaches to the 'http' listener on the gateway (plaintext port 8080).
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: https-redirect
  namespace: infra
spec:
  parentRefs:
    - name: bookstore-gateway
      namespace: infra
      sectionName: http
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            port: 30000
            statusCode: 301
