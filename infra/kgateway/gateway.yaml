---
# Main Gateway — NodePort 30000, handles all external traffic.
# Uses the Istio GatewayClass (included with Istio 1.21+).
# All HTTPRoutes attach to this Gateway via parentRefs.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: bookstore-gateway
  namespace: infra
  annotations:
    # Tell Istio to create this gateway's Service as NodePort (kind-friendly)
    networking.istio.io/service-type: NodePort
spec:
  gatewayClassName: istio
  listeners:
    - name: https
      protocol: HTTPS
      port: 8443
      tls:
        mode: Terminate
        certificateRefs:
          - name: bookstore-gateway-tls
      # Only allow HTTPRoutes from namespaces labeled allow-external-routes=true
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              allow-external-routes: "true"
    - name: http
      protocol: HTTP
      port: 8080
      # HTTP listener kept for redirect-to-HTTPS only
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              allow-external-routes: "true"
