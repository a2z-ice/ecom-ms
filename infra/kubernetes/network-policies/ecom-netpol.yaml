---
# ecom namespace — default deny all ingress/egress, then allow explicitly
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: ecom
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]

---
# Allow KGateway → ecom-service (UI traffic)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-ecom
  namespace: ecom
spec:
  podSelector:
    matchLabels:
      app: ecom-service
  ingress:
    # Istio gateway pod in infra namespace handles all external traffic
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
    # ui-service nginx proxy (same ecom namespace) proxies /ecom/* here
    - from:
        - podSelector:
            matchLabels:
              app: ui-service
    # Prometheus scraping from observability namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
  egress:
    # ecom-service → ecom-db (CNPG)
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: ecom-db
      ports:
        - port: 5432
    # ecom-service → Kafka
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - port: 9092
    # ecom-service → Redis
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
      ports:
        - port: 6379
    # ecom-service → Keycloak (JWKS)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: identity
      ports:
        - port: 8080
    # ecom-service → inventory-service (mTLS via ztunnel)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: inventory
      ports:
        - port: 8000
    # ecom-service → OTel Collector (traces + logs via OTLP gRPC/HTTP)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: otel
      ports:
        - port: 4317
        - port: 4318
    # Istio Ambient Mesh HBONE — ztunnel uses port 15008 for inter-pod mTLS tunneling.
    # Without this rule, ztunnel cannot establish encrypted tunnels to any destination
    # (ecom-db, inventory-service, etc.) and all connections time out.
    - to: []
      ports:
        - port: 15008
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP

---
# Allow KGateway → ui-service (static SPA files)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-gateway-to-ui
  namespace: ecom
spec:
  podSelector:
    matchLabels:
      app: ui-service
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
  egress:
    # ui-service nginx proxies /ecom/* to ecom-service
    - to:
        - podSelector:
            matchLabels:
              app: ecom-service
      ports:
        - port: 8080
    # ui-service nginx proxies /inven/* to inventory-service
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: inventory
      ports:
        - port: 8000
    # Istio Ambient Mesh HBONE — ztunnel tunneling for in-mesh proxy calls
    - to: []
      ports:
        - port: 15008
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP

---
# Allow ecom-db (CNPG) to receive from ecom-service, Debezium, CNPG operator, and inter-pod replication
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ecom-db-policy
  namespace: ecom
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: ecom-db
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: ecom-service
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: infra
    # CNPG operator access from cnpg-system namespace
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: cnpg-system
    # CNPG inter-pod replication (primary ↔ standby)
    - from:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: ecom-db
      ports:
        - port: 5432
        - port: 8000
  egress:
    # CNPG inter-pod replication
    - to:
        - podSelector:
            matchLabels:
              cnpg.io/cluster: ecom-db
      ports:
        - port: 5432
        - port: 8000
    # CNPG instance manager → K8s API server (kube-system namespace)
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - port: 443
    # K8s API server ClusterIP (10.96.0.1) — direct IP access
    - ports:
        - port: 443
        - port: 6443
    # DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
    # Istio HBONE
    - to: []
      ports:
        - port: 15008
