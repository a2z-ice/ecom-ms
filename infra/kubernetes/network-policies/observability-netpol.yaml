---
# observability namespace — default deny all ingress, then allow explicitly
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: observability
spec:
  podSelector: {}
  policyTypes: [Ingress]

---
# Prometheus ingress — restricted to Grafana (queries) and Kiali (traffic graph).
# Previously allowed all namespaces (namespaceSelector: {}); now locked down.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-ingress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: prometheus
  ingress:
    # Kiali in istio-system queries Prometheus for traffic graph data
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-system
      ports:
        - port: 9090
    # Grafana queries Prometheus (same namespace)
    - from:
        - podSelector:
            matchLabels:
              app: grafana
      ports:
        - port: 9090
    # HBONE — Istio Ambient mTLS tunneling
    - from: []
      ports:
        - port: 15008

---
# Grafana ingress — NodePort 32500 from host requires from: [] (host traffic
# has no namespace selector). Restricted to port 3000 only.
# Security layers: NetworkPolicy (port 3000) + Grafana login (admin/password) +
# PeerAuthentication (port-level PERMISSIVE on 3000 only).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-ingress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: grafana
  ingress:
    # Allow all sources on port 3000 (covers kind NodePort from host)
    - from: []
      ports:
        - port: 3000
    # HBONE — Istio Ambient mTLS tunneling
    - from: []
      ports:
        - port: 15008

---
# kube-state-metrics ingress — Prometheus only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kube-state-metrics-ingress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: kube-state-metrics
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 8080
        - port: 8081
    # HBONE — Istio Ambient mTLS tunneling
    - from: []
      ports:
        - port: 15008

---
# AlertManager ingress — Prometheus only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: alertmanager-ingress
  namespace: observability
spec:
  podSelector:
    matchLabels:
      app: alertmanager
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - port: 9093
    # HBONE — Istio Ambient mTLS tunneling
    - from: []
      ports:
        - port: 15008
