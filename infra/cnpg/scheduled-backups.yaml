---
# ScheduledBackup CRs — daily automated backups via CNPG barman to MinIO.
# These require the backup section to be enabled in each Cluster CR.

apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: ecom-db-daily-backup
  namespace: ecom
spec:
  schedule: "0 2 * * *"
  backupOwnerReference: self
  cluster:
    name: ecom-db

