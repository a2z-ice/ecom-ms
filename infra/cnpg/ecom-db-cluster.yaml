---
# Secret — ecom-db credentials for CNPG bootstrap
# CNPG reads username/password from this secret to create the DB owner.
# The secret MUST exist before the Cluster CR is applied.
apiVersion: v1
kind: Secret
metadata:
  name: ecom-db-cnpg-auth
  namespace: ecom
type: kubernetes.io/basic-auth
data:
  username: ZWNvbXVzZXI=         # ecomuser
  password: Q0hBTkdFX01F         # CHANGE_ME

---
# Keep the legacy secret for app compatibility (ecom-service reads POSTGRES_USER etc.)
apiVersion: v1
kind: Secret
metadata:
  name: ecom-db-secret
  namespace: ecom
type: Opaque
data:
  POSTGRES_USER: ZWNvbXVzZXI=         # ecomuser
  POSTGRES_PASSWORD: Q0hBTkdFX01F     # CHANGE_ME
  POSTGRES_DB: ZWNvbWRi               # ecomdb

---
# CloudNativePG Cluster — ecom-db (1 primary + 1 standby)
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ecom-db
  namespace: ecom
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:17

  # Exclude CNPG pods from Istio Ambient mesh — CNPG manages its own TLS
  # for streaming replication; ztunnel HBONE double-encryption causes timeouts.
  # NOTE: Pod annotation alone is NOT enough — Istio CNI overrides it when the
  # namespace has istio.io/dataplane-mode=ambient. Must use pod LABEL instead.
  inheritedMetadata:
    labels:
      istio.io/dataplane-mode: none
    annotations:
      ambient.istio.io/redirection: disabled

  postgresql:
    parameters:
      wal_level: logical
      max_replication_slots: "10"
      max_wal_senders: "10"
      wal_keep_size: 256MB

  # Sync logical replication slots from primary to standbys so they survive failover.
  # Without this, CNPG failover loses Debezium's logical slot → permanent crash loop.
  replicationSlots:
    highAvailability:
      enabled: true
      slotPrefix: _cnpg_
    synchronizeReplicas:
      enabled: true

  bootstrap:
    initdb:
      database: ecomdb
      owner: ecomuser
      secret:
        name: ecom-db-cnpg-auth
      postInitApplicationSQL:
        - ALTER USER ecomuser WITH REPLICATION;
        - CREATE PUBLICATION debezium_ecom_pub FOR ALL TABLES;

  storage:
    size: 2Gi
    storageClass: standard

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # ── Backup Configuration — MinIO S3-compatible store ──
  backup:
    barmanObjectStore:
      destinationPath: "s3://cnpg-backups/ecom-db/"
      endpointURL: "http://minio.infra.svc.cluster.local:9000"
      s3Credentials:
        accessKeyId:
          name: minio-secret
          key: ACCESS_KEY_ID
        secretAccessKey:
          name: minio-secret
          key: SECRET_ACCESS_KEY
      wal:
        compression: gzip
    retentionPolicy: "7d"

---
# ExternalName Service alias — apps connect to "ecom-db" as before.
# CNPG creates ecom-db-rw (primary), ecom-db-ro (standby), ecom-db-r (any).
# This alias ensures zero config changes in app secrets.
apiVersion: v1
kind: Service
metadata:
  name: ecom-db
  namespace: ecom
spec:
  type: ExternalName
  externalName: ecom-db-rw.ecom.svc.cluster.local
