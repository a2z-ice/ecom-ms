version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/ecom-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/inventory-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/e2e"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/csrf-service"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
