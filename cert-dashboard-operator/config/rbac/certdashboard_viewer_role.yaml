# This rule is not used by the project cert-dashboard-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to certs.bookstore.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cert-dashboard-operator
    app.kubernetes.io/managed-by: kustomize
  name: certdashboard-viewer-role
rules:
- apiGroups:
  - certs.bookstore.io
  resources:
  - certdashboards
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - certs.bookstore.io
  resources:
  - certdashboards/status
  verbs:
  - get
