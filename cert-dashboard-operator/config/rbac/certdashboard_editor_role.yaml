# This rule is not used by the project cert-dashboard-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the certs.bookstore.io.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cert-dashboard-operator
    app.kubernetes.io/managed-by: kustomize
  name: certdashboard-editor-role
rules:
- apiGroups:
  - certs.bookstore.io
  resources:
  - certdashboards
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - certs.bookstore.io
  resources:
  - certdashboards/status
  verbs:
  - get
