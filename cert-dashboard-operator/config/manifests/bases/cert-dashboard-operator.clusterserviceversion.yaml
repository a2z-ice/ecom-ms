apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: '[]'
    capabilities: Seamless Upgrades
    categories: Security
    description: Monitors and manages cert-manager certificate lifecycle with a web dashboard
    repository: https://github.com/bookstore/cert-dashboard-operator
    containerImage: bookstore/cert-dashboard-operator:latest
  name: cert-dashboard-operator.v0.0.0
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: >-
        CertDashboard deploys a web-based dashboard for monitoring cert-manager
        Certificate resources. It displays certificate lifecycle status with
        color-coded progress bars (green > 10d, yellow <= 10d, red <= 5d),
        provides one-click renewal with SSE live streaming, and auto-refreshes
        every 30 seconds.
      displayName: Cert Dashboard
      kind: CertDashboard
      name: certdashboards.certs.bookstore.io
      version: v1alpha1
      specDescriptors:
      - description: Namespaces to monitor (empty = all namespaces)
        displayName: Namespaces
        path: namespaces
      - description: NodePort for the dashboard service (30000-32767)
        displayName: NodePort
        path: nodePort
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:number
      - description: Container image for the dashboard
        displayName: Image
        path: image
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:text
      - description: Number of dashboard replicas
        displayName: Replicas
        path: replicas
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:podCount
      statusDescriptors:
      - description: Whether the dashboard is available
        displayName: Ready
        path: ready
        x-descriptors:
        - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
      - description: Dashboard URL
        displayName: URL
        path: url
        x-descriptors:
        - urn:alm:descriptor:org.w3:link
  description: >-
    ## Cert Dashboard Operator

    A Kubernetes operator that deploys and manages a web dashboard for monitoring
    cert-manager Certificate resources. The operator watches CertDashboard custom
    resources and reconciles a dashboard Deployment, Service, and RBAC configuration.


    ### Features

    - **Certificate Monitoring**: Displays all cert-manager certificates with expiry
      status, DNS names, issuer info, serial numbers, and algorithm details.

    - **Color-Coded Lifecycle**: Progress bars show certificate lifetime with
      configurable thresholds (green > yellow days, yellow > red days, red = critical).

    - **One-Click Renewal**: Trigger certificate renewal through the web UI with
      real-time Server-Sent Events (SSE) streaming of the renewal process.

    - **Auto-Refresh**: Dashboard automatically refreshes certificate data every 30 seconds.

    - **Security Hardened**: Non-root containers, read-only filesystem, dropped capabilities,
      seccomp profile, and Kubernetes TokenReview-based authentication for mutating operations.

    - **Kubernetes Native**: Uses standard Kubernetes patterns including finalizers,
      owner references, status conditions, and leader election.


    ### Prerequisites

    - cert-manager v1.0+ installed in the cluster

    - Kubernetes 1.28+
  displayName: Cert Dashboard Operator
  icon:
  - base64data: 
    mediatype: image/svg+xml
  install:
    spec:
      deployments: null
    strategy: ""
  installModes:
  - supported: true
    type: OwnNamespace
  - supported: true
    type: SingleNamespace
  - supported: false
    type: MultiNamespace
  - supported: true
    type: AllNamespaces
  keywords:
  - certificates
  - cert-manager
  - tls
  - dashboard
  - monitoring
  - security
  - operator
  links:
  - name: Cert Dashboard Operator
    url: https://github.com/bookstore/cert-dashboard-operator
  - name: Documentation
    url: https://github.com/bookstore/cert-dashboard-operator/blob/main/README.md
  maintainers:
  - email: admin@bookstore.io
    name: BookStore Platform Team
  maturity: alpha
  provider:
    name: BookStore Platform
    url: https://github.com/bookstore
  version: 0.0.0
  minKubeVersion: "1.28.0"
