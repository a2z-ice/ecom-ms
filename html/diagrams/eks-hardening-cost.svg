<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/></filter>
    <linearGradient id="savingsBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/><stop offset="18%" stop-color="#ef4444"/><stop offset="19%" stop-color="#10b981"/><stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <marker id="arW" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8" fill="#fbbf24"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="12"/>

  <!-- ============================================================ -->
  <!-- TITLE                                                         -->
  <!-- ============================================================ -->
  <text x="600" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#f1f5f9">AWS EKS &#x2014; Cost Optimization: Before vs After</text>
  <text x="600" y="52" text-anchor="middle" font-size="11" fill="#64748b">Right-Sizing &#x2022; Graviton &#x2022; Spot Instances &#x2022; Serverless Scaling &#x2022; VPC Endpoint Consolidation</text>

  <!-- ============================================================ -->
  <!-- LEFT COLUMN: BEFORE (Over-provisioned)                        -->
  <!-- ============================================================ -->
  <rect x="40" y="72" width="480" height="580" rx="10" fill="rgba(239,68,68,0.06)" stroke="#ef4444" stroke-width="2" filter="url(#sh)"/>
  <rect x="48" y="76" width="260" height="22" rx="5" fill="#ef4444"/>
  <text x="178" y="92" text-anchor="middle" font-size="12" font-weight="800" fill="#0f172a">BEFORE (Over-provisioned)</text>
  <text x="325" y="92" font-size="10" fill="#fca5a5" font-weight="600">Typical first deployment</text>

  <!-- EKS Compute -->
  <rect x="60" y="108" width="440" height="68" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="130" font-size="12" font-weight="700" fill="#f87171">EKS Compute</text>
  <text x="80" y="148" font-size="10" fill="#94a3b8">5x t3.xlarge On-Demand (4 vCPU, 16 GB each)</text>
  <text x="80" y="166" font-size="9" fill="#64748b">All nodes same size &#x2022; No spot &#x2022; No Graviton &#x2022; Over-provisioned</text>
  <text x="470" y="140" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$585</text>
  <text x="470" y="155" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- Aurora -->
  <rect x="60" y="184" width="440" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="206" font-size="12" font-weight="700" fill="#f87171">Aurora PostgreSQL</text>
  <text x="80" y="222" font-size="10" fill="#94a3b8">4 clusters &#x2022; min 2 ACU each &#x2022; Always running</text>
  <text x="80" y="236" font-size="9" fill="#64748b">High minimum = paying for idle capacity 24/7</text>
  <text x="470" y="214" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$344</text>
  <text x="470" y="229" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- MSK -->
  <rect x="60" y="252" width="440" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="274" font-size="12" font-weight="700" fill="#f87171">Amazon MSK (Kafka)</text>
  <text x="80" y="290" font-size="10" fill="#94a3b8">3x kafka.m5.large (2 vCPU, 8 GB each)</text>
  <text x="80" y="304" font-size="9" fill="#64748b">Production-class brokers for dev/POC workload</text>
  <text x="470" y="282" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$648</text>
  <text x="470" y="297" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- Redis -->
  <rect x="60" y="320" width="440" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="342" font-size="12" font-weight="700" fill="#f87171">ElastiCache Redis</text>
  <text x="80" y="358" font-size="10" fill="#94a3b8">cache.r6g.large (2 vCPU, 13 GB)</text>
  <text x="80" y="372" font-size="9" fill="#64748b">Memory-optimized for CSRF + rate-limit (uses &lt;100MB)</text>
  <text x="470" y="350" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$200</text>
  <text x="470" y="365" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- NAT -->
  <rect x="60" y="388" width="440" height="60" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="410" font-size="12" font-weight="700" fill="#f87171">NAT Gateways</text>
  <text x="80" y="426" font-size="10" fill="#94a3b8">3x NAT GWs (one per AZ) + data processing</text>
  <text x="80" y="440" font-size="9" fill="#64748b">Most traffic should use VPC Endpoints instead</text>
  <text x="470" y="418" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$135</text>
  <text x="470" y="433" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- ALB -->
  <rect x="60" y="456" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1.2" filter="url(#sh)"/>
  <text x="80" y="478" font-size="12" font-weight="700" fill="#f87171">Application Load Balancer</text>
  <text x="80" y="494" font-size="10" fill="#94a3b8">Standard ALB + WAF (fixed cost)</text>
  <text x="470" y="484" text-anchor="end" font-size="16" font-weight="800" fill="#f87171">$45</text>
  <text x="470" y="499" text-anchor="end" font-size="9" fill="#94a3b8">/month</text>

  <!-- Divider -->
  <line x1="60" y1="520" x2="490" y2="520" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- TOTAL BEFORE -->
  <rect x="60" y="530" width="440" height="56" rx="8" fill="rgba(239,68,68,0.15)" stroke="#ef4444" stroke-width="2"/>
  <text x="80" y="556" font-size="14" font-weight="700" fill="#fca5a5">MONTHLY TOTAL</text>
  <text x="470" y="550" text-anchor="end" font-size="28" font-weight="900" fill="#ef4444">$2,957</text>
  <text x="470" y="576" text-anchor="end" font-size="11" fill="#fca5a5">$35,484 / year</text>

  <!-- Waste indicator -->
  <rect x="60" y="596" width="440" height="44" rx="6" fill="#0f172a" stroke="#f87171" stroke-width="0.8"/>
  <text x="280" y="614" text-anchor="middle" font-size="10" font-weight="700" fill="#f87171">Waste Analysis</text>
  <text x="280" y="630" text-anchor="middle" font-size="9" fill="#94a3b8">~65% resources idle &#x2022; No autoscaling &#x2022; No spot &#x2022; No right-sizing</text>

  <!-- ============================================================ -->
  <!-- CENTER ARROW                                                  -->
  <!-- ============================================================ -->
  <line x1="540" y1="360" x2="660" y2="360" stroke="#fbbf24" stroke-width="3" marker-end="url(#arW)"/>
  <rect x="548" y="330" width="104" height="22" rx="6" fill="#fbbf24"/>
  <text x="600" y="346" text-anchor="middle" font-size="11" font-weight="800" fill="#0f172a">Optimization</text>
  <text x="600" y="380" text-anchor="middle" font-size="9" fill="#fbbf24" font-weight="600">Right-size + Spot</text>
  <text x="600" y="394" text-anchor="middle" font-size="9" fill="#fbbf24" font-weight="600">+ Graviton + Serverless</text>

  <!-- ============================================================ -->
  <!-- RIGHT COLUMN: AFTER (Production-Optimized)                    -->
  <!-- ============================================================ -->
  <rect x="680" y="72" width="480" height="580" rx="10" fill="rgba(16,185,129,0.06)" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>
  <rect x="688" y="76" width="260" height="22" rx="5" fill="#10b981"/>
  <text x="818" y="92" text-anchor="middle" font-size="12" font-weight="800" fill="#0f172a">AFTER (Production-Optimized)</text>
  <text x="965" y="92" font-size="10" fill="#6ee7b7" font-weight="600">Same workload, less cost</text>

  <!-- EKS System Nodes -->
  <rect x="700" y="108" width="440" height="42" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="128" font-size="11" font-weight="700" fill="#10b981">EKS System Nodes</text>
  <text x="720" y="142" font-size="9" fill="#94a3b8">2x t4g.medium On-Demand (Graviton ARM)</text>
  <text x="1110" y="130" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$56</text>

  <!-- EKS App Nodes -->
  <rect x="700" y="156" width="440" height="42" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="176" font-size="11" font-weight="700" fill="#10b981">EKS App Nodes</text>
  <text x="720" y="190" font-size="9" fill="#94a3b8">3x t3.large Spot Instances (82% savings)</text>
  <text x="1110" y="178" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$52</text>

  <!-- Savings badge for compute -->
  <rect x="1030" y="112" width="80" height="16" rx="4" fill="#10b981"/>
  <text x="1070" y="124" text-anchor="middle" font-size="9" font-weight="800" fill="#0f172a">-82% saved</text>

  <!-- Aurora -->
  <rect x="700" y="206" width="440" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="226" font-size="11" font-weight="700" fill="#10b981">Aurora Serverless v2</text>
  <text x="720" y="242" font-size="9" fill="#94a3b8">4 clusters &#x2022; min 0.5 ACU &#x2022; Scales to 0 when idle</text>
  <text x="1110" y="230" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$172</text>
  <rect x="1030" y="240" width="80" height="16" rx="4" fill="#10b981"/>
  <text x="1070" y="252" text-anchor="middle" font-size="9" font-weight="800" fill="#0f172a">-50% saved</text>

  <!-- MSK -->
  <rect x="700" y="264" width="440" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="284" font-size="11" font-weight="700" fill="#10b981">Amazon MSK</text>
  <text x="720" y="300" font-size="9" fill="#94a3b8">3x kafka.t3.small (right-sized for CDC throughput)</text>
  <text x="1110" y="288" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$150</text>
  <rect x="1030" y="298" width="80" height="16" rx="4" fill="#10b981"/>
  <text x="1070" y="310" text-anchor="middle" font-size="9" font-weight="800" fill="#0f172a">-77% saved</text>

  <!-- Redis -->
  <rect x="700" y="322" width="440" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="342" font-size="11" font-weight="700" fill="#10b981">ElastiCache Redis</text>
  <text x="720" y="358" font-size="9" fill="#94a3b8">cache.t3.micro (right-sized: CSRF uses &lt;100MB)</text>
  <text x="1110" y="346" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$13</text>
  <rect x="1030" y="356" width="80" height="16" rx="4" fill="#10b981"/>
  <text x="1070" y="368" text-anchor="middle" font-size="9" font-weight="800" fill="#0f172a">-93% saved</text>

  <!-- NAT -->
  <rect x="700" y="380" width="440" height="50" rx="8" fill="#1e293b" stroke="#10b981" stroke-width="1.2" filter="url(#sh)"/>
  <text x="720" y="400" font-size="11" font-weight="700" fill="#10b981">NAT + VPC Endpoints</text>
  <text x="720" y="416" font-size="9" fill="#94a3b8">1x NAT GW + VPC Endpoints (S3, ECR, STS, CW, SM)</text>
  <text x="1110" y="404" text-anchor="end" font-size="14" font-weight="800" fill="#10b981">$55</text>
  <rect x="1030" y="414" width="80" height="16" rx="4" fill="#10b981"/>
  <text x="1070" y="426" text-anchor="middle" font-size="9" font-weight="800" fill="#0f172a">-59% saved</text>

  <!-- ALB -->
  <rect x="700" y="438" width="440" height="42" rx="8" fill="#1e293b" stroke="#94a3b8" stroke-width="1" filter="url(#sh)"/>
  <text x="720" y="458" font-size="11" font-weight="700" fill="#94a3b8">ALB + WAF</text>
  <text x="720" y="472" font-size="9" fill="#64748b">Same (fixed cost, no optimization needed)</text>
  <text x="1110" y="462" text-anchor="end" font-size="14" font-weight="800" fill="#94a3b8">$45</text>

  <!-- Savings Plan -->
  <rect x="700" y="488" width="440" height="30" rx="6" fill="rgba(251,191,36,0.1)" stroke="#fbbf24" stroke-width="1"/>
  <text x="720" y="508" font-size="10" font-weight="700" fill="#fbbf24">Compute Savings Plan (1yr)</text>
  <text x="1060" y="508" text-anchor="end" font-size="10" fill="#fbbf24">-30% on remaining On-Demand</text>

  <!-- Divider -->
  <line x1="700" y1="530" x2="1130" y2="530" stroke="#475569" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- TOTAL AFTER -->
  <rect x="700" y="540" width="440" height="56" rx="8" fill="rgba(16,185,129,0.15)" stroke="#10b981" stroke-width="2"/>
  <text x="720" y="566" font-size="14" font-weight="700" fill="#6ee7b7">MONTHLY TOTAL</text>
  <text x="1110" y="560" text-anchor="end" font-size="28" font-weight="900" fill="#10b981">$543</text>
  <text x="1110" y="586" text-anchor="end" font-size="11" fill="#6ee7b7">$6,516 / year</text>

  <!-- Optimization techniques -->
  <rect x="700" y="604" width="440" height="44" rx="6" fill="#0f172a" stroke="#10b981" stroke-width="0.8"/>
  <text x="920" y="622" text-anchor="middle" font-size="10" font-weight="700" fill="#10b981">Optimization Techniques Applied</text>
  <text x="920" y="638" text-anchor="middle" font-size="9" fill="#94a3b8">Graviton ARM &#x2022; Spot 82% off &#x2022; Serverless min 0.5 &#x2022; Right-sizing &#x2022; VPC Endpoints</text>

  <!-- ============================================================ -->
  <!-- BOTTOM: Savings Summary Bar                                   -->
  <!-- ============================================================ -->
  <rect x="40" y="668" width="1120" height="120" rx="10" fill="rgba(16,185,129,0.08)" stroke="#10b981" stroke-width="2" filter="url(#sh)"/>

  <!-- Title -->
  <text x="600" y="696" text-anchor="middle" font-size="16" font-weight="800" fill="#f1f5f9">ANNUAL COST COMPARISON</text>

  <!-- Bar background -->
  <rect x="80" y="710" width="1040" height="30" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>

  <!-- Before portion (red, full width represents $2,957) -->
  <rect x="80" y="710" width="1040" height="30" rx="6" fill="rgba(239,68,68,0.3)" stroke="none"/>

  <!-- After portion (green, proportional: 543/2957 = ~18.4%) -->
  <rect x="80" y="710" width="191" height="30" rx="6" fill="rgba(16,185,129,0.5)" stroke="none"/>

  <!-- Labels on bar -->
  <text x="170" y="730" text-anchor="middle" font-size="11" font-weight="800" fill="#10b981">$543/mo</text>
  <text x="600" y="730" text-anchor="middle" font-size="11" font-weight="700" fill="#fca5a5">$2,414/mo SAVED</text>
  <text x="1040" y="730" text-anchor="middle" font-size="11" font-weight="800" fill="#ef4444">$2,957/mo</text>

  <!-- Percentage marker -->
  <line x1="271" y1="710" x2="271" y2="740" stroke="#fbbf24" stroke-width="2"/>
  <text x="271" y="754" text-anchor="middle" font-size="10" font-weight="800" fill="#fbbf24">18.4%</text>

  <!-- Bottom summary -->
  <rect x="200" y="762" width="800" height="22" rx="6" fill="#10b981"/>
  <text x="600" y="778" text-anchor="middle" font-size="13" font-weight="900" fill="#0f172a">81% COST REDUCTION: $2,957/mo &#x2192; $543/mo = $28,968/year saved</text>

  <!-- Footer -->
  <text x="600" y="796" text-anchor="middle" font-size="9" fill="#334155">BookStore Platform &#x2022; AWS EKS Cost Optimization &#x2022; Same workload, 81% less cost</text>
</svg>