<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.3"/></filter>
    <filter id="shLg"><feDropShadow dx="0" dy="3" stdDeviation="6" flood-opacity="0.35"/></filter>
    <linearGradient id="redGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7f1d1d"/><stop offset="100%" stop-color="#451a1a"/>
    </linearGradient>
    <linearGradient id="greenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14532d"/><stop offset="100%" stop-color="#0a2e1a"/>
    </linearGradient>
    <linearGradient id="savingsGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <marker id="arW" markerWidth="10" markerHeight="8" refX="10" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8" fill="#f1f5f9"/></marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)" rx="16"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- TITLE                                               -->
  <!-- ═══════════════════════════════════════════════════ -->
  <text x="600" y="34" text-anchor="middle" font-size="21" font-weight="800" fill="#f1f5f9">Azure AKS &#x2014; Cost Optimization: Before vs After</text>
  <text x="600" y="54" text-anchor="middle" font-size="12" fill="#64748b">Right-Sizing &#x2022; Spot Instances &#x2022; Burstable DBs &#x2022; Auto-Stop &#x2022; Reserved Instances</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- LEFT: BEFORE (Over-provisioned) — Red/Amber          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="74" width="480" height="540" rx="12" fill="url(#redGrad)" stroke="#f87171" stroke-width="2" filter="url(#shLg)"/>

  <!-- Header -->
  <rect x="40" y="74" width="480" height="40" rx="12" fill="#991b1b"/>
  <rect x="40" y="102" width="480" height="12" fill="#991b1b"/>
  <text x="280" y="100" text-anchor="middle" font-size="15" font-weight="800" fill="#fecaca">&#x26A0; BEFORE (Over-Provisioned)</text>

  <!-- Line items -->
  <!-- AKS System -->
  <rect x="60" y="126" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="146" font-size="11" font-weight="700" fill="#f1f5f9">AKS System Pool</text>
  <text x="76" y="164" font-size="10" fill="#94a3b8">3x Standard_D4s_v3 On-Demand</text>
  <text x="476" y="156" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$432/mo</text>

  <!-- AKS App -->
  <rect x="60" y="184" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="204" font-size="11" font-weight="700" fill="#f1f5f9">AKS App Pool</text>
  <text x="76" y="222" font-size="10" fill="#94a3b8">5x Standard_D4s_v3 On-Demand</text>
  <text x="476" y="214" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$720/mo</text>

  <!-- PostgreSQL -->
  <rect x="60" y="242" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="262" font-size="11" font-weight="700" fill="#f1f5f9">PostgreSQL Flexible</text>
  <text x="76" y="280" font-size="10" fill="#94a3b8">4x General Purpose D4s_v3</text>
  <text x="476" y="272" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$544/mo</text>

  <!-- Redis -->
  <rect x="60" y="300" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="320" font-size="11" font-weight="700" fill="#f1f5f9">Redis Cache</text>
  <text x="76" y="338" font-size="10" fill="#94a3b8">Premium P1 (6GB, clustering)</text>
  <text x="476" y="330" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$224/mo</text>

  <!-- Event Hubs -->
  <rect x="60" y="358" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="378" font-size="11" font-weight="700" fill="#f1f5f9">Event Hubs</text>
  <text x="76" y="396" font-size="10" fill="#94a3b8">Premium 2PU (overkill for POC)</text>
  <text x="476" y="388" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$1,462/mo</text>

  <!-- App Gateway -->
  <rect x="60" y="416" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="436" font-size="11" font-weight="700" fill="#f1f5f9">App Gateway WAF v2</text>
  <text x="76" y="454" font-size="10" fill="#94a3b8">Standard capacity (always-on)</text>
  <text x="476" y="446" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$350/mo</text>

  <!-- Misc -->
  <rect x="60" y="474" width="440" height="50" rx="8" fill="#1e293b" stroke="#f87171" stroke-width="1" filter="url(#sh)"/>
  <text x="76" y="494" font-size="11" font-weight="700" fill="#f1f5f9">Key Vault + ACR + DNS</text>
  <text x="76" y="512" font-size="10" fill="#94a3b8">Standard tiers, premium features unused</text>
  <text x="476" y="504" text-anchor="end" font-size="14" font-weight="700" fill="#fca5a5">$50/mo</text>

  <!-- Divider -->
  <line x1="60" y1="538" x2="500" y2="538" stroke="#f87171" stroke-width="1.5" opacity="0.6"/>

  <!-- TOTAL -->
  <text x="76" y="564" font-size="13" font-weight="700" fill="#f1f5f9">MONTHLY TOTAL</text>
  <text x="476" y="564" text-anchor="end" font-size="24" font-weight="900" fill="#f87171">~$4,265/mo</text>
  <text x="476" y="584" text-anchor="end" font-size="11" fill="#fca5a5">$51,180/year</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- CENTER: Optimization Arrow                           -->
  <!-- ═══════════════════════════════════════════════════ -->
  <line x1="536" y1="350" x2="668" y2="350" stroke="#f1f5f9" stroke-width="3" marker-end="url(#arW)"/>
  <rect x="556" y="310" width="120" height="30" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="616" y="330" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">Optimization</text>

  <text x="616" y="374" text-anchor="middle" font-size="9" fill="#94a3b8">Right-size</text>
  <text x="616" y="388" text-anchor="middle" font-size="9" fill="#94a3b8">Spot VMs</text>
  <text x="616" y="402" text-anchor="middle" font-size="9" fill="#94a3b8">Auto-stop</text>
  <text x="616" y="416" text-anchor="middle" font-size="9" fill="#94a3b8">Reserved 1yr</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- RIGHT: AFTER (Optimized) — Green                     -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="680" y="74" width="480" height="540" rx="12" fill="url(#greenGrad)" stroke="#34d399" stroke-width="2" filter="url(#shLg)"/>

  <!-- Header -->
  <rect x="680" y="74" width="480" height="40" rx="12" fill="#166534"/>
  <rect x="680" y="102" width="480" height="12" fill="#166534"/>
  <text x="920" y="100" text-anchor="middle" font-size="15" font-weight="800" fill="#bbf7d0">&#x2714; AFTER (Optimized)</text>

  <!-- AKS System -->
  <rect x="700" y="126" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="146" font-size="11" font-weight="700" fill="#f1f5f9">AKS System Pool</text>
  <text x="716" y="164" font-size="10" fill="#94a3b8">2x Standard_D2s_v3 On-Demand</text>
  <text x="1116" y="156" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$144/mo</text>

  <!-- AKS App (Spot) -->
  <rect x="700" y="184" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="204" font-size="11" font-weight="700" fill="#f1f5f9">AKS App Pool &#x2014; Spot</text>
  <text x="716" y="222" font-size="10" fill="#94a3b8">3x Standard_D2as_v5 AMD Spot (~96% off)</text>
  <text x="1116" y="214" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$26/mo</text>

  <!-- PostgreSQL (Dev = Burstable) -->
  <rect x="700" y="242" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="262" font-size="11" font-weight="700" fill="#f1f5f9">PostgreSQL Flexible (Dev)</text>
  <text x="716" y="280" font-size="10" fill="#94a3b8">4x Burstable B1ms (1 vCore, 2GB)</text>
  <text x="1116" y="272" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$52/mo</text>

  <!-- Redis -->
  <rect x="700" y="300" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="320" font-size="11" font-weight="700" fill="#f1f5f9">Redis Cache</text>
  <text x="716" y="338" font-size="10" fill="#94a3b8">Standard C0 (250MB, sufficient for CSRF + sessions)</text>
  <text x="1116" y="330" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$32/mo</text>

  <!-- Event Hubs -->
  <rect x="700" y="358" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="378" font-size="11" font-weight="700" fill="#f1f5f9">Event Hubs</text>
  <text x="716" y="396" font-size="10" fill="#94a3b8">Standard 1 TU (1MB/s in, 2MB/s out)</text>
  <text x="1116" y="388" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$22/mo</text>

  <!-- App Gateway -->
  <rect x="700" y="416" width="440" height="50" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="436" font-size="11" font-weight="700" fill="#f1f5f9">App Gateway WAF v2</text>
  <text x="716" y="454" font-size="10" fill="#94a3b8">Autoscale min=1 (pay per capacity unit)</text>
  <text x="1116" y="446" text-anchor="end" font-size="14" font-weight="700" fill="#86efac">$173/mo</text>

  <!-- Savings strategies -->
  <rect x="700" y="474" width="440" height="50" rx="8" fill="#0e2a4d" stroke="#60a5fa" stroke-width="1" filter="url(#sh)"/>
  <text x="716" y="494" font-size="11" font-weight="700" fill="#60a5fa">&#x23F0; Auto-Stop Savings</text>
  <text x="716" y="512" font-size="10" fill="#93c5fd">AKS + PostgreSQL stopped 6pm&#x2013;8am weekdays + weekends &#x2192; &#x2212;60%</text>

  <!-- Divider -->
  <line x1="700" y1="538" x2="1140" y2="538" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>

  <!-- TOTALS -->
  <text x="716" y="560" font-size="12" font-weight="700" fill="#f1f5f9">DEV MONTHLY</text>
  <text x="1116" y="560" text-anchor="end" font-size="22" font-weight="900" fill="#34d399">~$449/mo</text>

  <text x="716" y="586" font-size="12" font-weight="700" fill="#f1f5f9">PROD MONTHLY (Reserved 1yr &#x2212;33%)</text>
  <text x="1116" y="586" text-anchor="end" font-size="18" font-weight="800" fill="#86efac">~$939/mo</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- BOTTOM: Savings Summary Bar                          -->
  <!-- ═══════════════════════════════════════════════════ -->
  <rect x="40" y="634" width="1120" height="80" rx="12" fill="#1e293b" stroke="#34d399" stroke-width="2" filter="url(#shLg)"/>

  <text x="600" y="658" text-anchor="middle" font-size="14" font-weight="800" fill="#f1f5f9">Annual Savings Summary</text>

  <!-- Dev savings bar -->
  <rect x="80" y="668" width="480" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="80" y="668" width="427" height="32" rx="6" fill="url(#savingsGrad)" opacity="0.9"/>
  <text x="320" y="689" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">DEV: 89% Reduction</text>
  <text x="548" y="689" font-size="10" font-weight="600" fill="#34d399">$4,265 &#x2192; $449</text>

  <!-- Prod savings bar -->
  <rect x="620" y="668" width="500" height="32" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <rect x="620" y="668" width="390" height="32" rx="6" fill="url(#savingsGrad)" opacity="0.9"/>
  <text x="870" y="689" text-anchor="middle" font-size="13" font-weight="800" fill="#0f172a">PROD: 78% Reduction</text>
  <text x="1098" y="689" font-size="10" font-weight="600" fill="#34d399">$4,265 &#x2192; $939</text>

  <!-- Footer -->
  <text x="600" y="738" text-anchor="middle" font-size="10" fill="#64748b">Prices estimated from Azure Pricing Calculator (East US region) &#x2022; March 2026 &#x2022; Excludes bandwidth + support</text>
  <text x="600" y="756" text-anchor="middle" font-size="9" fill="#475569">Spot VMs: eviction risk mitigated by AKS node auto-replace &#x2022; Reserved Instances: 1-year commitment for prod workloads</text>
</svg>