---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecom-service
  namespace: ecom
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: ecom-service
  template:
    metadata:
      labels:
        app: ecom-service
    spec:
      terminationGracePeriodSeconds: 30
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: ecom-service
      serviceAccountName: ecom-service
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      containers:
        - name: ecom-service
          image: bookstore/ecom-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: ecom-service-secret
          env:
            # Spring Boot 4.0 may initialize JPA before Liquibase; setting ddl-auto=none
            # prevents Hibernate validation from running before Liquibase creates tables.
            # Liquibase owns schema creation via spring.liquibase.change-log.
            - name: SPRING_JPA_HIBERNATE_DDL_AUTO
              value: "none"
            # Inventory service base URL for synchronous mTLS reserve calls.
            # Istio ztunnel authenticates this pod as cluster.local/ns/ecom/sa/ecom-service.
            - name: INVENTORY_SERVICE_URL
              value: "http://inventory-service.inventory.svc.cluster.local:8000"
            # JVM tuning flags
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=75.0 -XX:+UseG1GC -javaagent:/otel/opentelemetry-javaagent.jar"
            - name: OTEL_SERVICE_NAME
              value: "ecom-service"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "http://otel-collector.otel.svc.cluster.local:4318"
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: "http/protobuf"
            - name: OTEL_TRACES_EXPORTER
              value: "otlp"
            - name: OTEL_METRICS_EXPORTER
              value: "none"
            - name: OTEL_LOGS_EXPORTER
              value: "otlp"
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=ecom,deployment.environment=production"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Spring Boot Tomcat needs a writable /tmp to create working directories
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          startupProbe:
            httpGet:
              path: /ecom/actuator/health/liveness
              port: 8080
            periodSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /ecom/actuator/health/readiness
              port: 8080
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /ecom/actuator/health/liveness
              port: 8080
            periodSeconds: 15
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
      volumes:
        - name: tmp
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: ecom-service
  namespace: ecom
spec:
  selector:
    app: ecom-service
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
