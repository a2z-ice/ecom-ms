  KEYCLOAK_JWKS_URI: aHR0cDovL2tleWNsb2FrLmlkZW50aXR5LnN2Yy5jbHVzdGVyLmxvY2FsOjgwODAvcmVhbG1zL2Jvb2tzdG9yZS9wcm90b2NvbC9vcGVuaWQtY29ubmVjdC9jZXJ0cw==
