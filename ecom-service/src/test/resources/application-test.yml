server:
  port: 0
  servlet:
    context-path: /ecom

spring:
  application:
    name: ecom-service-test

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true

  # Kafka disabled for integration tests — bootstrap-servers overridden via @DynamicPropertySource
  kafka:
    bootstrap-servers: localhost:9999

  # Redis not needed for integration tests
  data:
    redis:
      host: localhost
      port: 6379
      password: unused

  # JWT security — overridden in tests via mock JWT decoder
  security:
    oauth2:
      resourceserver:
        jwt:
          jwks-uri: http://localhost:0/not-used

management:
  endpoints:
    web:
      exposure:
        include: health

csrf:
  enabled: false

logging:
  level:
    root: WARN
    com.bookstore: INFO
