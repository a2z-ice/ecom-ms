---
apiVersion: v1
kind: Secret
metadata:
  name: csrf-service-secret
  namespace: infra
type: Opaque
data:
  CSRF_REDIS_HOST: cmVkaXMuaW5mcmEuc3ZjLmNsdXN0ZXIubG9jYWw=
  CSRF_REDIS_PORT: NjM3OQ==
  CSRF_REDIS_PASSWORD: Q0hBTkdFX01F
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csrf-service
  namespace: infra
  labels:
    app: csrf-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: csrf-service
  template:
    metadata:
      labels:
        app: csrf-service
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: csrf-service
          image: bookstore/csrf-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: csrf-service-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: csrf-service
  namespace: infra
  labels:
    app: csrf-service
spec:
  selector:
    app: csrf-service
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
