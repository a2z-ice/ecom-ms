---
apiVersion: v1
kind: Secret
metadata:
  name: csrf-service-secret
  namespace: infra
type: Opaque
data:
  CSRF_REDIS_HOST: cmVkaXMuaW5mcmEuc3ZjLmNsdXN0ZXIubG9jYWw=
  CSRF_REDIS_PORT: NjM3OQ==
  CSRF_REDIS_PASSWORD: Q0hBTkdFX01F
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: csrf-service
  namespace: infra
  labels:
    app: csrf-service
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: csrf-service
  template:
    metadata:
      labels:
        app: csrf-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: csrf-service
          image: bookstore/csrf-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: CSRF_TOKEN_TTL_MINUTES
              value: "10"
            - name: CSRF_SLIDING_TTL
              value: "true"
          envFrom:
            - secretRef:
                name: csrf-service-secret
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /livez
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ["sleep", "5"]
---
apiVersion: v1
kind: Service
metadata:
  name: csrf-service
  namespace: infra
  labels:
    app: csrf-service
spec:
  selector:
    app: csrf-service
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
